services:
  postgres:
    image: postgres:16
    container_name: ocmi-timesheets-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ocmi
      POSTGRES_PASSWORD: ocmi_password
      POSTGRES_DB: ocmi_timesheets
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: